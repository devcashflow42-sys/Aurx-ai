<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>AuraAI — Inicio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/home.css" />
</head>
<body>

<!-- ═══ DRAWER OVERLAY ════════════════════════════ -->
<div class="drawer-overlay" id="drawer-overlay" aria-hidden="true"></div>

<!-- ═══ DRAWER (slide from left) ════════════════════════════ -->
<aside class="drawer" id="drawer" aria-label="Menú lateral">
  <div class="drawer-head">
    <div class="drawer-logo">
      <div class="drawer-logo-mark">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <span>AuraAI</span>
    </div>
    <button class="drawer-collapse" id="drawer-close" aria-label="Cerrar menú">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="11 17 6 12 11 7"/><polyline points="18 17 13 12 18 7"/></svg>
    </button>
  </div>

  <div class="drawer-nav">
    <button class="drawer-new-task" id="drawer-new-task">
      <span class="drawer-new-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      </span>
      <span>Nueva tarea</span>
    </button>
    <button class="drawer-nav-item">
      <span class="drawer-nav-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      </span>
      <span>Generar Imágenes</span>
      <span class="soon-badge">Pronto</span>
    </button>
    <button class="drawer-nav-item">
      <span class="drawer-nav-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </span>
      <span>Showcase</span>
    </button>
  </div>

  <div class="drawer-body">
    <div class="drawer-section-label" id="active-label" style="display:none">Tareas activas</div>
    <div class="conv-list active-list" id="active-list"></div>
    <div class="drawer-section-label">Conversaciones recientes</div>
    <div class="conv-list recent-list" id="recent-list">
      <div class="conv-loading"><div class="conv-spinner"></div></div>
    </div>
  </div>

  <div class="drawer-foot">
    <div class="drawer-credits">
      <div class="credits-left">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="#8b5cf6"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6L12 2z"/></svg>
        <span id="drawer-token-count">—</span>
      </div>
      <button class="drawer-buy-btn" id="drawer-buy-btn">
        Comprar
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
      </button>
    </div>
    <div class="drawer-profile" id="drawer-profile">
      <div class="dp-avatar" id="dp-avatar">D</div>
      <div class="dp-meta">
        <div class="dp-name" id="dp-name">Dev CashFlow</div>
        <div class="dp-email" id="dp-email">dev@ejemplo.com</div>
      </div>
      <button class="dp-arrow" id="dp-arrow" aria-label="Opciones de cuenta">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
    </div>
  </div>
</aside>

<!-- ═══ HOME PAGE ════════════════════════════════ -->
<div class="home-page">

  <!-- TOPBAR -->
  <header class="home-topbar">
    <div class="topbar-left">
      <button class="topbar-btn" id="hamburger" aria-label="Abrir menú">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M3 12h18M3 6h18M3 18h12"/></svg>
      </button>
    </div>
    <div class="topbar-right">
      <button class="buy-credits-btn" id="buy-credits-btn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6L12 2z"/></svg>
        Comprar créditos
      </button>
      <button class="topbar-btn notif-btn" aria-label="Notificaciones">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      </button>
    </div>
  </header>

  <!-- HOME CONTENT (clean white, no sky) -->
  <div class="home-content">
    <div class="status-pill">
      <span class="status-dot"></span>
      Online &amp; listo
    </div>
    <h1 class="home-heading">¿En qué puedo<br/><em>ayudarte?</em></h1>
    <p class="home-sub" id="home-sub">Cuéntame tu idea y la hacemos realidad.</p>

    <div class="home-cards">
      <button class="hc" onclick="setHomeInput('Construye una Full Stack App con autenticación, base de datos y panel de administración')">
        <div class="hc-icon hc-icon--purple">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        </div>
        <div class="hc-title">Construye una app</div>
        <div class="hc-desc">Full stack, mobile o API REST</div>
      </button>
      <button class="hc" onclick="setHomeInput('Diseña una landing page moderna y profesional para una startup de tecnología con animaciones')">
        <div class="hc-icon hc-icon--blue">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        </div>
        <div class="hc-title">Diseña tu landing</div>
        <div class="hc-desc">Convierte visitantes en clientes</div>
      </button>
      <button class="hc" onclick="setHomeInput('Crea un dashboard de analytics con gráficos interactivos y métricas en tiempo real')">
        <div class="hc-icon hc-icon--green">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        </div>
        <div class="hc-title">Crea un dashboard</div>
        <div class="hc-desc">Analytics y métricas en tiempo real</div>
      </button>
      <button class="hc" onclick="setHomeInput('Desarrolla una tienda e-commerce completa con catálogo, carrito y sistema de pagos')">
        <div class="hc-icon hc-icon--orange">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        </div>
        <div class="hc-title">Lanza tu tienda</div>
        <div class="hc-desc">E-commerce listo para vender</div>
      </button>
    </div>
  </div>

  <!-- BOTTOM INPUT AREA -->
  <div class="home-input-area">
    <!-- Main input box -->
    <div class="home-input-box" id="home-input-box">
      <textarea
        id="home-input"
        placeholder="Crea una app SaaS para..."
        rows="1"
        autocomplete="off"
        spellcheck="true"
        aria-label="Escribe lo que quieres crear"
      ></textarea>
      <div class="home-input-footer">
        <div class="home-input-tools">
          <button class="tool-btn" title="Adjuntar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <button class="tool-btn" title="Idioma">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          </button>
          <button class="tool-btn" title="Configuración">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
          </button>
          <button class="tool-btn" title="Micrófono">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </button>
        </div>
        <button class="home-send-btn" id="home-send-btn" disabled aria-label="Enviar">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- FEATURE BAR -->
  <div class="feature-bar" id="feature-bar">
    <div class="feature-bar-inner">
      <div class="fb-logo">
        <div class="drawer-logo-mark" style="width:22px;height:22px;">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        </div>
      </div>
      <span class="fb-text">Presentando <strong>AuraAI Pro</strong></span>
      <span class="fb-badge">Beta</span>
      <button class="fb-arrow" aria-label="Ver más">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
  </div>

</div>

<script src="js/home.js"></script>
</body>
</html>
