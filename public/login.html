<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#E8E8E6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>

  <!-- Toolbar -->
  <header class="toolbar">
    <button class="back-btn" onclick="location.href='/'" title="Atrás" aria-label="Volver">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
  </header>

  <!-- Page -->
  <main class="page">
    <div class="card">

      <!-- Header -->
      <div class="card-header">
        <div class="deco-line"></div>
        <h1 class="title" id="mainTitle">Bienvenido otra vez</h1>
        <p class="subtitle" id="mainSubtitle">Inicia sesión para continuar</p>
      </div>

      <!-- Form -->
      <form onsubmit="handleSubmit(event)" autocomplete="off">

        <!-- Usuario — solo en registro -->
        <div class="field slide-field hidden" id="fieldUsuario">
          <label for="usuario">Usuario</label>
          <div class="input-wrap">
            <input type="text" id="usuario" placeholder="Tu nombre de usuario" />
          </div>
        </div>

        <!-- Correo -->
        <div class="field">
          <label for="email">Correo electrónico</label>
          <div class="input-wrap">
            <input type="email" id="email" placeholder="ejemplo@correo.com" />
          </div>
        </div>

        <!-- Contraseña -->
        <div id="fieldPassword">
        <div class="field">
          <label for="password">Contraseña</label>
          <div class="input-wrap">
            <input type="password" id="password" placeholder="••••••••"
                   oninput="checkStrength('password','bars1','label1','confirm')" />
            <button type="button" class="eye-btn" onclick="toggleEye('password','eye1')" aria-label="Mostrar contraseña">
              <svg id="eye1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="strength-wrap" id="bars1">
            <div class="strength-bar"></div>
            <div class="strength-bar"></div>
            <div class="strength-bar"></div>
            <div class="strength-bar"></div>
          </div>
          <p class="strength-label" id="label1"></p>
        </div>

        <!-- Recuperar contraseña -->
        <div class="recover-row" id="recoverRow">
          <button type="button" class="recover-link" onclick="goRecover()">Recuperar contraseña</button>
        </div>
        </div>

        <!-- Confirmar contraseña — solo en registro -->
        <div class="field slide-field hidden" id="fieldConfirm">
          <label for="confirm">Confirmar contraseña</label>
          <div class="input-wrap">
            <input type="password" id="confirm" placeholder="••••••••"
                   oninput="checkStrength('confirm','bars2','label2',null); checkMatch()" />
            <button type="button" class="eye-btn" onclick="toggleEye('confirm','eye2')" aria-label="Mostrar confirmación">
              <svg id="eye2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="strength-wrap" id="bars2">
            <div class="strength-bar"></div>
            <div class="strength-bar"></div>
            <div class="strength-bar"></div>
            <div class="strength-bar"></div>
          </div>
          <p class="strength-label" id="label2"></p>
        </div>

        <!-- Botón acción -->
        <div class="btn-row">
          <button type="submit" class="btn btn-primary" id="btnAction">Iniciar sesión</button>
        </div>

      </form>

      <!-- Links de modo -->
      <div class="toggle-section">
        <div class="toggle-row" id="rowLogin" style="display:none;">
          <span>¿Ya tienes una cuenta?</span>
          <button class="toggle-link" onclick="goLogin()">Iniciar sesión</button>
        </div>
        <div class="toggle-row" id="rowRegister">
          <span>¿No tengo una cuenta?</span>
          <button class="toggle-link" onclick="goRegister()">Inscribirse</button>
        </div>
      </div>

    </div>
  </main>

  <script src="js/login.js"></script>

</body>
</html>
