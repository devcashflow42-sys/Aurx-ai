<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mis Proyectos — AuraAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/projects.css" />
</head>
<body>

<!-- ── CREATE PROJECT MODAL ─────────────────── -->
<div class="modal-overlay" id="modal-overlay" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" id="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title">Nuevo Proyecto</h2>
      <button class="icon-btn" id="modal-close" aria-label="Cerrar modal">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <form class="modal-form" id="create-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="field-name">Nombre del proyecto</label>
        <input class="form-input" type="text" id="field-name" placeholder="Mi nuevo proyecto" autocomplete="off" required data-testid="field-name" />
      </div>
      <div class="form-group">
        <label class="form-label" for="field-category">Categoría</label>
        <select class="form-select" id="field-category" required data-testid="field-category">
          <option value="">Seleccionar categoría…</option>
          <option value="code">Programación</option>
          <option value="web">Diseño Web</option>
          <option value="image">Generación de Imágenes</option>
          <option value="text">Texto</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="field-desc">Descripción <span class="form-optional">(opcional)</span></label>
        <textarea class="form-textarea" id="field-desc" placeholder="Describe brevemente el proyecto…" rows="3" data-testid="field-desc"></textarea>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-cancel" id="modal-cancel">Cancelar</button>
        <button type="submit" class="btn-create" data-testid="btn-create-submit">Crear proyecto</button>
      </div>
    </form>
  </div>
</div>

<!-- ── APP SHELL ─────────────────────────────── -->
<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar" aria-label="Navegación de categorías">
    <div class="sidebar-header">
      <a href="/" class="brand" aria-label="AuraAI — Inicio">
        <div class="brand-mark">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <span>AuraAI</span>
      </a>
      <button class="icon-btn" id="sidebar-close" aria-label="Cerrar sidebar">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <div class="sidebar-section-label">Explorar</div>

    <nav class="sidebar-nav" aria-label="Filtros de categoría">
      <button class="nav-item active" data-filter="all" data-testid="filter-all" aria-pressed="true">
        <span class="nav-icon nav-icon-all">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="2" width="8" height="8" rx="1.5"/><rect x="14" y="2" width="8" height="8" rx="1.5"/><rect x="2" y="14" width="8" height="8" rx="1.5"/><rect x="14" y="14" width="8" height="8" rx="1.5"/></svg>
        </span>
        <span class="nav-label">Todos</span>
        <span class="nav-badge" id="count-all">12</span>
      </button>
      <button class="nav-item" data-filter="code" data-testid="filter-code" aria-pressed="false">
        <span class="nav-icon nav-icon-code">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        </span>
        <span class="nav-label">Programación</span>
        <span class="nav-badge" id="count-code">3</span>
      </button>
      <button class="nav-item" data-filter="web" data-testid="filter-web" aria-pressed="false">
        <span class="nav-icon nav-icon-web">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        </span>
        <span class="nav-label">Diseño Web</span>
        <span class="nav-badge" id="count-web">3</span>
      </button>
      <button class="nav-item" data-filter="image" data-testid="filter-image" aria-pressed="false">
        <span class="nav-icon nav-icon-image">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </span>
        <span class="nav-label">Imágenes</span>
        <span class="nav-badge" id="count-image">3</span>
      </button>
      <button class="nav-item" data-filter="text" data-testid="filter-text" aria-pressed="false">
        <span class="nav-icon nav-icon-text">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        </span>
        <span class="nav-label">Texto</span>
        <span class="nav-badge" id="count-text">3</span>
      </button>
    </nav>

    <div class="sidebar-divider"></div>
    <div class="sidebar-section-label">Navegación</div>

    <nav class="sidebar-nav">
      <a href="/chat-ai" class="nav-item nav-link">
        <span class="nav-icon">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </span>
        <span class="nav-label">Chat AI</span>
      </a>
      <a href="/" class="nav-item nav-link">
        <span class="nav-icon">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </span>
        <span class="nav-label">Inicio</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="btn-new-project" id="btn-new" data-testid="btn-new-project">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        Nuevo Proyecto
      </button>
    </div>
  </aside>

  <!-- MOBILE OVERLAY -->
  <div class="overlay" id="overlay" aria-hidden="true"></div>

  <!-- MAIN -->
  <main class="main-area">

    <header class="main-header">
      <div class="header-row header-top">
        <button class="icon-btn hamburger" id="hamburger" aria-label="Abrir menú" aria-expanded="false" aria-controls="sidebar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M3 12h18M3 6h18M3 18h11"/></svg>
        </button>
        <div class="page-title-group">
          <h1 class="page-title" id="page-title">Todos los Proyectos</h1>
          <span class="result-count" id="result-count">12 proyectos</span>
        </div>
      </div>
      <div class="header-row header-controls">
        <div class="search-wrap">
          <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input class="search-input" type="text" id="search-input"
            placeholder="Buscar proyectos… (Ctrl+K)"
            autocomplete="off" spellcheck="false"
            aria-label="Buscar proyectos"
            data-testid="search-input" />
          <button class="search-clear" id="search-clear" aria-label="Limpiar búsqueda" hidden>
            <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>
        <div class="controls-right">
          <select class="sort-select" id="sort-select" aria-label="Ordenar proyectos" data-testid="sort-select">
            <option value="date">Más recientes</option>
            <option value="name">A → Z</option>
            <option value="status">Estado</option>
          </select>
          <div class="view-toggle" role="group" aria-label="Cambiar vista">
            <button class="view-btn active" id="btn-grid" aria-label="Vista cuadrícula" aria-pressed="true" data-testid="view-grid">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"><rect x="2" y="2" width="8" height="8" rx="1"/><rect x="14" y="2" width="8" height="8" rx="1"/><rect x="2" y="14" width="8" height="8" rx="1"/><rect x="14" y="14" width="8" height="8" rx="1"/></svg>
            </button>
            <button class="view-btn" id="btn-list" aria-label="Vista lista" aria-pressed="false" data-testid="view-list">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
            </button>
          </div>
        </div>
      </div>
    </header>

    <div class="projects-container" id="projects-container">
      <!-- Injected by JS -->
    </div>

  </main>
</div>

<script src="js/projects.js"></script>
</body>
</html>
